services:
  db:
    image: postgres:15
    container_name: postgres-container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 200505
      POSTGRES_DB: ERP
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./backend
    container_name: fastapi-container
    env_file:
      - .env
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "3000:3000"
    restart: always

volumes:
  postgres_data:
    